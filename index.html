    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      if(!lat1 || !lon1 || !lat2 || !lon2) return 0;
      const R = 6371; const dLat = (lat2 - lat1) * (Math.PI / 180); const dLon = (lon2 - lon1) * (Math.PI / 180);
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }
    function getBearing(lat1, lon1, lat2, lon2) {
      if(!lat1 || !lon1 || !lat2 || !lon2) return 0;
      const y = Math.sin((lon2 - lon1) * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180));
      const x = Math.cos(lat1 * (Math.PI / 180)) * Math.sin(lat2 * (Math.PI / 180)) - Math.sin(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.cos((lon2 - lon1) * (Math.PI / 180));
      return (Math.atan2(y, x) * (180 / Math.PI) + 360) % 360;
    }
    function calculateETA(distanceInKm) {
        if(distanceInKm === 0) return "--";
        const minutes = Math.ceil((distanceInKm * 1000) / 80); 
        if(minutes < 1) return "0 min";
        if(minutes > 60) return `${Math.floor(minutes / 60)}h ${minutes % 60}m`;
        return `${minutes} min`;
    }

    const useGoogleMaps = (apiKey) => {
      const [isLoaded, setIsLoaded] = useState(false);
      useEffect(() => {
        if (window.google && window.google.maps) { setIsLoaded(true); return; }
        if (!apiKey) return;
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=geometry`;
        script.async = true; script.defer = true;
        script.onload = () => setIsLoaded(true);
        document.head.appendChild(script);
      }, [apiKey]);
      return isLoaded;
    };

    const GoogleMapView = ({ myLocation, companions, isLoaded, meetupPoint, meetupLabel, onMapClick, mapType, focusCoords, isUrdu }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      const meetupMarkerRef = useRef(null);
      const meetupInfoRef = useRef(null);

      useEffect(() => {
        if (isLoaded && mapRef.current && !mapInstanceRef.current && window.google && window.google.maps) {
          mapInstanceRef.current = new window.google.maps.Map(mapRef.current, {
            center: myLocation || defaultLoc, zoom: 17, disableDefaultUI: true, mapTypeId: mapType || 'roadmap', gestureHandling: 'greedy'
          });
          mapInstanceRef.current.addListener('click', (e) => { 
              if(onMapClick) onMapClick({ lat: e.latLng.lat(), lng: e.latLng.lng() }); 
          });
        }
      }, [isLoaded]);

      useEffect(() => { if(mapInstanceRef.current && isLoaded) mapInstanceRef.current.setMapTypeId(mapType); }, [mapType, isLoaded]);

      useEffect(() => {
          if(mapInstanceRef.current && isLoaded && focusCoords) {
              mapInstanceRef.current.panTo({ lat: focusCoords.lat, lng: focusCoords.lng });
              mapInstanceRef.current.setZoom(19);
          }
      }, [focusCoords, isLoaded]);

      useEffect(() => {
        if (mapInstanceRef.current && window.google && window.google.maps) {
          if (!myLocation) return; 
          if (!myMarkerRef.current) {
            myMarkerRef.current = new window.google.maps.Marker({
              position: myLocation, map: mapInstanceRef.current,
              icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#3b82f6', fillOpacity: 1, strokeColor: '#ffffff', strokeWeight: 3 }, zIndex: 1000
            });
            const myInfo = new window.google.maps.InfoWindow({ content: `<div style="font-weight:800;color:#2563eb;padding:3px;font-size:13px;font-family:sans-serif;">You (Me)</div>`, disableAutoPan: true });
            myMarkerRef.current.addListener('click', () => myInfo.open(mapInstanceRef.current, myMarkerRef.current));
            mapInstanceRef.current.panTo(myLocation);
          } else { 
            myMarkerRef.current.setPosition(myLocation); 
          }
        }
      }, [myLocation, isLoaded]);

      useEffect(() => {
          if (mapInstanceRef.current && window.google && window.google.maps) {
              if (meetupMarkerRef.current) meetupMarkerRef.current.setMap(null);
              if (meetupInfoRef.current) meetupInfoRef.current.close();
              if (meetupPoint) {
                  meetupMarkerRef.current = new window.google.maps.Marker({
                      position: meetupPoint, map: mapInstanceRef.current,
                      icon: { path: 'M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z', fillColor: '#ef4444', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 1.6 }, zIndex: 950
                  });
                  if(meetupLabel){
                      meetupInfoRef.current = new window.google.maps.InfoWindow({ content: `<div style="font-weight:900;color:#b91c1c;padding:3px 6px;font-size:15px;font-family:sans-serif;">🚩 ${meetupLabel}</div>`, disableAutoPan: true });
                      meetupMarkerRef.current.addListener('click', () => meetupInfoRef.current.open(mapInstanceRef.current, meetupMarkerRef.current));
                      meetupInfoRef.current.open(mapInstanceRef.current, meetupMarkerRef.current);
                  }
              }
          }
      }, [meetupPoint, meetupLabel, isLoaded]);

      useEffect(() => {
        if (mapInstanceRef.current && window.google && window.google.maps) {
          companions.forEach(comp => {
            if (!markersRef.current[comp.id]) {
              const info = new window.google.maps.InfoWindow({ content: `<div style="color:#000;padding:4px;font-family:sans-serif;text-align:center;"><div style="font-weight:900;font-size:14px;">${comp.name}</div></div>`, disableAutoPan:true });
              const marker = new window.google.maps.Marker({
                position: { lat: comp.lat, lng: comp.lng }, map: mapInstanceRef.current,
                icon: { path: window.google.maps.SymbolPath.BACKWARD_CLOSED_ARROW, scale: 7, fillColor: comp.color || '#f59e0b', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }, zIndex: 900
              });
              marker.addListener('click', () => { mapInstanceRef.current.panTo({ lat: comp.lat, lng: comp.lng }); info.open(mapInstanceRef.current, marker); });
              info.open(mapInstanceRef.current, marker);
              markersRef.current[comp.id] = { marker, info };
            } else { markersRef.current[comp.id].marker.setPosition({ lat: comp.lat, lng: comp.lng }); }
          });
          const ids = companions.map(c => c.id);
          Object.keys(markersRef.current).forEach(id => {
            if (!ids.includes(id)) { markersRef.current[id].marker.setMap(null); markersRef.current[id].info.close(); delete markersRef.current[id]; }
          });
        }
      }, [companions, isLoaded]);

      return (
        <div className="w-full h-full bg-slate-100 relative overflow-hidden rounded-[2rem]">
             <div ref={mapRef} className="absolute inset-0 w-full h-full"></div>
             {!isLoaded && (
                 <div className="absolute inset-0 bg-slate-100 flex items-center justify-center z-10 pointer-events-none">
                     <div className="animate-spin rounded-full h-10 w-10 border-b-4 border-emerald-500"></div>
                 </div>
             )}
        </div>
      );
    };

    function App() {
      const [hasConsent, setHasConsent] = useState(() => localStorage.getItem('umrah_location_consent') === 'true');
      const [lang, setLang] = useState('hi');
      const t = translations[lang];
      const isUrdu = lang === 'ur';

      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('group');
      const [myLocation, setMyLocation] = useState(null);
      
      const [companions, setCompanions] = useState([]);
      const [groupId, setGroupId] = useState('');
      const [groupMeta, setGroupMeta] = useState(null);
      
      const [myName, setMyName] = useState('');
      const [myPhone, setMyPhone] = useState('');
      const [createEmergencyPhone, setCreateEmergencyPhone] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [myColor, setMyColor] = useState('#3b82f6');
      
      const [mapType, setMapType] = useState('roadmap');
      const [focusCoords, setFocusCoords] = useState(null);
      
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [unreadCount, setUnreadCount] = useState(0);
      const chatEndRef = useRef(null);
      
      const [showSOSModal, setShowSOSModal] = useState(false);
      const [showSupportModal, setShowSupportModal] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [legalContent, setLegalContent] = useState(null);

      const [copied, setCopied] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      
      const isMapLoaded = useGoogleMaps(GOOGLE_MAPS_API_KEY);
      const prevCompanionsRef = useRef([]);
      const arrivedAlertSent = useRef(false);

      const isAdmin = user && groupMeta && user.uid === groupMeta.creatorId;

      const acceptConsent = () => {
          localStorage.setItem('umrah_location_consent', 'true');
          setHasConsent(true);
      };

      useEffect(() => {
        if(!hasConsent) return; 
        const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) {} };
        initAuth();
        const unsub = onAuthStateChanged(auth, (u) => {
            setUser(u);
            const colors = ['#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#eab308'];
            setMyColor(colors[Math.floor(Math.random() * colors.length)]);
        });
        return () => unsub();
      }, [hasConsent]);

      useEffect(() => {
        if (!navigator.geolocation || !hasConsent) return;
        const watchId = navigator.geolocation.watchPosition(
          (p) => setMyLocation({ lat: p.coords.latitude, lng: p.coords.longitude }),
          (err) => { 
              if(err.code === 1) showToast("Location Permission Band Hai!");
          }, 
          { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
        );
        return () => navigator.geolocation.clearWatch(watchId);
      }, [hasConsent]);

      useEffect(() => {
          if (myLocation && groupMeta?.meetupPoint) {
              const distInKm = getDistanceFromLatLonInKm(myLocation.lat, myLocation.lng, groupMeta.meetupPoint.lat, groupMeta.meetupPoint.lng);
              if (distInKm < 0.05) { 
                  if (!arrivedAlertSent.current) {
                      showToast(t.meetupAlert);
                      try {
                          if ('speechSynthesis' in window) {
                              const msg = new SpeechSynthesisUtterance(t.meetupAlert);
                              msg.lang = isUrdu ? 'ur-PK' : 'hi-IN'; window.speechSynthesis.speak(msg);
                          }
                      } catch(e){}
                      arrivedAlertSent.current = true;
                  }
              } else if (distInKm > 0.1) arrivedAlertSent.current = false; 
          }
      }, [myLocation, groupMeta?.meetupPoint, lang]);

      useEffect(() => {
          if(!user || !groupId || !groupMeta) return;
          if(groupMeta.banned && groupMeta.banned.includes(user.uid)) {
              setGroupId(''); setGroupMeta(null); setCompanions([]); setActiveTab('group');
          }
      }, [groupMeta, user, groupId]);

      useEffect(() => {
        if (!user || !groupId || !myLocation || !myName.trim()) return;
        if(groupMeta && groupMeta.banned && groupMeta.banned.includes(user.uid)) return;
        const sync = async () => {
          try {
            await setDoc(doc(db, 'hajj_groups', groupId, 'members', user.uid), {
                id: user.uid, name: myName.trim(), phone: myPhone.trim(), lat: myLocation.lat, lng: myLocation.lng, color: myColor, lastUpdated: serverTimestamp()
            }, { merge: true });
          } catch(e) {}
        }
        sync();
        const interval = setInterval(sync, 4000);
        return () => clearInterval(interval);
      }, [user, groupId, myLocation, myName, myPhone, myColor, groupMeta]);

      useEffect(() => {
        if (!user || !groupId) return;
        const unsubMeta = onSnapshot(doc(db, 'hajj_groups', groupId), (d) => { if(d.exists()) setGroupMeta(d.data()); });
        const unsubMembers = onSnapshot(collection(db, 'hajj_groups', groupId, 'members'), (snap) => {
          const list = []; snap.forEach(d => { if (d.id !== user.uid) list.push(d.data()); }); 
          prevCompanionsRef.current = list;
          setCompanions(list);
        });

        const q = query(collection(db, 'hajj_groups', groupId, 'messages'), orderBy('timestamp', 'asc'));
        const unsubMsgs = onSnapshot(q, (snap) => {
            const msgs = []; snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
            setMessages(prev => {
                if(msgs.length > prev.length && activeTab !== 'chat' && msgs.length > 0) {
                    const lastMsg = msgs[msgs.length - 1];
                    if(lastMsg.senderId !== user.uid) setUnreadCount(c => c + 1);
                }
                return msgs;

            setTimeout(() => { if(chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, 150);
        });
        return () => { unsubMeta(); unsubMembers(); unsubMsgs(); };

        if (!myName.trim() || !createEmergencyPhone.trim()) return;

            await setDoc(doc(db, 'hajj_groups', code), { emergencyPhone: createEmergencyPhone.trim(), creatorId: user.uid, creatorName: myName.trim(), banned: [] });
            setGroupId(code); setActiveTab('home');

      const handleJoin = async () => {
        if (!myName.trim() || !joinCode.trim() || !user) return;
        try {
            const snap = await getDoc(doc(db, 'hajj_groups', joinCode.trim()));
            if (snap.exists()) { 
                const data = snap.data();
                if(data.banned && data.banned.includes(user.uid)) return;
                setGroupId(joinCode.trim()); setActiveTab('home');

        } catch(e) {}

                  await deleteDoc(doc(db, 'hajj_groups', groupId, 'members', uid));

                  await setDoc(doc(db, 'hajj_groups', groupId), { banned: [...currentBanned, uid] }, {merge: true});

              try { await setDoc(doc(db, 'hajj_groups', groupId), { meetupPoint: point, meetupLabel: label }, { merge: true }); arrivedAlertSent.current = false; } catch(e) {}
          }

      const removeMeetupFlag = async (e) => {

              setGroupId(''); setCompanions([]); setGroupMeta(null); setActiveTab('group');
          }
      };

      const sendChatMessage = async (e) => {
          e.preventDefault();
          if(!newMessage.trim() || !groupId || !user) return;
          const msg = newMessage.trim(); setNewMessage('');
          try {
              await addDoc(collection(db, 'hajj_groups', groupId, 'messages'), { text: msg, senderId: user.uid, senderName: myName, color: myColor, timestamp: serverTimestamp() });
          } catch (e) {}
      };

      const callAdminDirect = () => { const p = groupMeta?.emergencyPhone.replace(/\D/g, ''); window.location.href = `tel:+${p}`; setShowSOSModal(false); };
      const whatsappAdmin = () => {
          const p = groupMeta?.emergencyPhone.replace(/\D/g, ''); 
          const link = myLocation ? `https://www.google.com/maps/search/?api=1&query=${myLocation.lat},${myLocation.lng}` : '';
          window.open(`https://wa.me/${p}?text=🚨 EMERGENCY ALERT 🚨%0A%0AName: ${myName}%0APhone: ${myPhone}%0ALocation: ${link}`, '_blank');
          setShowSOSModal(false);
      };

      const getDirectionsToFlag = (e) => {
          e.stopPropagation();
          if(!myLocation || !groupMeta?.meetupPoint) return;
          window.open(`https://www.google.com/maps/dir/?api=1&origin=${myLocation.lat},${myLocation.lng}&destination=${groupMeta.meetupPoint.lat},${groupMeta.meetupPoint.lng}&travelmode=walking`, '_blank');
      };

      const focusOnMeetup = () => { if(groupMeta?.meetupPoint) setFocusCoords({ ...groupMeta.meetupPoint, t: Date.now() }); };
      const recenterMapToMe = () => { if(myLocation) setFocusCoords({ ...myLocation, t: Date.now() }); };
      const toggleMapType = () => setMapType(t => t === 'roadmap' ? 'hybrid' : 'roadmap');
      const toggleLanguage = () => { setLang(l => l === 'hi' ? 'en' : l === 'en' ? 'ur' : 'hi'); setIsMenuOpen(false); }
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); }
      const copyCode = () => { navigator.clipboard.writeText(groupId); setCopied(true); setTimeout(() => setCopied(false), 2000); }
      const copyUPI = () => { navigator.clipboard.writeText('asaadilas905-1@okaxis'); showToast(t.copied); }

      const upiUrl = `upi://pay?pa=asaadilas905-1@okaxis&pn=UmrahTracker&cu=INR`;
      const qrCodeApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiUrl)}`;

      // PLAY STORE CONSENT MODAL
      if (!hasConsent) {
          return (
             <div className={`h-[100dvh] w-full flex items-center justify-center font-sans text-slate-800 bg-slate-900 px-4 ${isUrdu ? 'dir-rtl' : 'dir-ltr'}`}>

                        <MapPin size={40} className="fill-blue-100" />

                    <h3 className="text-2xl font-black text-slate-800 mb-4">{t.consentTitle}</h3>
                    <p className="text-slate-600 text-sm font-medium mb-8 leading-relaxed text-left bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner">
                        {t.consentMsg}

                    <button onClick={acceptConsent} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-4 rounded-xl active:scale-95 transition-all shadow-lg shadow-blue-600/30">
                        {t.agree}

             </div>

      }

                            <input value={createEmergencyPhone} onChange={e => setCreateEmergencyPhone(e.target.value)} placeholder={t.emergencyHint} type="tel" className="w-full p-4 rounded-xl mb-4 outline-none border border-white focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 font-bold bg-white shadow-sm transition-all" />

                            <div className="flex gap-2">

                                <button onClick={handleJoin} className="bg-blue-600 text-white px-6 font-black text-sm uppercase tracking-wider rounded-xl shadow-lg shadow-blue-600/30 active:scale-95 transition-all">{t.joinBtn}</button>
                            </div>
                        </div>

                   ) : (

                        <UsersRound size={48} className="mx-auto mb-4 text-emerald-400" />
                        <h2 className="text-2xl font-black mb-1">{t.activeGroup}</h2>
                        <div className="bg-white/10 backdrop-blur-md border border-white/10 p-5 rounded-[2rem] mt-6 mb-8 flex flex-col items-center">
                            <p className="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-2">{t.groupCode}</p>
                            <div className="flex items-center gap-4">
                               <span className="text-4xl font-mono font-black text-white tracking-widest">{groupId}</span>

                            </div>

                     </div>
                   )}
                </div>
              )}

              {/* MAP TAB */}
              {activeTab === 'home' && (
                <div className="space-y-4 animate-in fade-in duration-300">
                   {!groupId && (
                      <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl flex items-start gap-3 shadow-sm">
                         <AlertTriangle size={20} className="shrink-0 text-amber-500 mt-1" />
                         <div>
                            <p className="font-black text-amber-900 mb-1 text-sm">{t.offlineTitle}</p>
                            <p className="text-amber-700/80 text-[10px] mb-3 font-bold leading-tight">{t.offlineDesc}</p>
                            <button onClick={() => setActiveTab('group')} className="bg-amber-200 px-3 py-1.5 rounded-lg text-amber-900 font-bold text-[9px] uppercase tracking-widest">{t.goGroupBtn}</button>
                         </div>

                   {groupId && groupMeta?.meetupPoint && (
                      <div onClick={focusOnMeetup} className="bg-red-50 border border-red-200 p-3 pl-4 rounded-[1.5rem] flex items-center justify-between cursor-pointer active:scale-95 transition-all shadow-sm">
                        <div className="flex flex-col">
                            <p className="text-[9px] text-red-500 font-black uppercase tracking-widest flex items-center gap-1.5 mb-0.5">
                                <Flag size={10} className="fill-red-500"/> {t.meetupPoint} <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>

                           <button onClick={getDirectionsToFlag} className="bg-blue-600 text-white px-3 py-2 rounded-xl shadow-md shadow-blue-500/30 active:scale-90 transition-all flex items-center gap-1 text-[10px] font-black uppercase">
                               <Route size={14} /> {t.route}
                           </button>
                           {/* BIG CLEAR ADMIN REMOVE FLAG BUTTON */}
                           {isAdmin && (
                              <button onClick={removeMeetupFlag} className="bg-red-100 text-red-600 px-3 py-2 rounded-xl shadow-sm active:scale-90 transition-all flex items-center gap-1 text-[10px] font-black uppercase border border-red-200 hover:bg-red-200">
                                  <FlagOff size={16}/> {t.removeFlag}
                              </button>
                           )}
                        </div>
                      </div>
                   )}

                   <div className="relative w-full h-[48vh] min-h-[350px] shadow-sm border border-slate-200 overflow-hidden bg-slate-200 rounded-[2rem]">
                      <GoogleMapView myLocation={myLocation} companions={companions} isLoaded={isMapLoaded} meetupPoint={groupMeta?.meetupPoint} meetupLabel={groupMeta?.meetupLabel} onMapClick={handleMapClickForMeetup} mapType={mapType} focusCoords={focusCoords} isUrdu={isUrdu} />
                      <button onClick={toggleMapType} className={`absolute top-4 ${isUrdu ? 'left-4' : 'right-4'} bg-white/90 backdrop-blur-md p-2.5 rounded-xl shadow-lg border border-slate-200/50 text-slate-700 active:scale-90`}>
                          <Layers size={20} className={mapType === 'hybrid' ? 'text-emerald-600' : ''} />
                      </button>
                      
                      {/* Secondary BIG Remove Flag Button Direct on Map (For Admin only) */}
                      {groupId && isAdmin && groupMeta?.meetupPoint && (
                         <button onClick={removeMeetupFlag} className={`absolute top-16 mt-2 ${isUrdu ? 'left-4' : 'right-4'} bg-red-600 backdrop-blur-md p-3 rounded-2xl shadow-lg border-2 border-white text-white active:scale-90 flex items-center justify-center`} title={t.removeFlag}>
                            <FlagOff size={22} />
                         </button>
                      )}

                      <button onClick={recenterMapToMe} className={`absolute bottom-6 ${isUrdu ? 'left-4' : 'right-4'} z-20 w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg border-2 border-white active:scale-90`}>
                        <Crosshair size={22} />
                      </button>
                      {groupId && isAdmin && !groupMeta?.meetupPoint && (
                         <div className={`absolute bottom-6 ${isUrdu ? 'right-4 left-16' : 'left-4 right-16'} bg-slate-900/80 backdrop-blur-md text-white text-[9px] p-2.5 rounded-xl shadow-xl border border-slate-700 font-bold pointer-events-none`}>
                            {t.adminTip}
                         </div>
                      )}
                   </div>

                   <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                      <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-between mb-4">
                          <span className="flex items-center gap-2"><Compass size={14} className="text-blue-500"/> {t.directions}</span>
                          {companions.length > 0 && <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">{companions.length}</span>}
                      </h3>
                      
                      <div className="space-y-3">
                          {companions.length === 0 ? (
                              <div className="text-center py-6 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                                  <UsersRound size={24} className="mx-auto text-slate-300 mb-2"/>
                                  <p className="text-[10px] text-slate-400 font-bold">{t.noMembers}</p>
                              </div>
                          ) : 
                            companions.map(c => {
                              const dist = myLocation ? getDistanceFromLatLonInKm(myLocation.lat, myLocation.lng, c.lat, c.lng) : 0;
                              const bearing = myLocation ? getBearing(myLocation.lat, myLocation.lng, c.lat, c.lng) : 0;
                              const isFar = (dist * 1000) > 300; 
                              const isThisAdmin = groupMeta?.creatorId === c.id;
                              const distToMeetup = groupMeta?.meetupPoint ? getDistanceFromLatLonInKm(c.lat, c.lng, groupMeta.meetupPoint.lat, groupMeta.meetupPoint.lng) : 0;
                              const etaString = groupMeta?.meetupPoint ? calculateETA(distToMeetup) : "--";

                              return (
                                <div key={c.id} className={`p-4 rounded-2xl border flex flex-col gap-3 transition-all relative overflow-hidden ${isFar ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'}`}>
                                    {isAdmin && (
                                        <button onClick={() => handleRemoveUser(c.id, c.name)} className={`absolute top-2 ${isUrdu ? 'left-2' : 'right-2'} p-1.5 bg-red-100 text-red-600 rounded-full`}>
                                            <UserMinus size={14} />
                                        </button>
                                    )}
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-black shadow-inner border-2 border-white shrink-0 relative" style={{ backgroundColor: c.color || '#3b82f6' }}>
                                                {c.name.charAt(0)}
                                                {isThisAdmin && <div className="absolute -top-1 -right-1 bg-amber-400 p-0.5 rounded-full border border-white"><Crown size={8} className="text-white"/></div>}
                                            </div>
                                            <div>
                                                <h4 className="font-black text-slate-800 text-xs flex items-center gap-1.5">
                                                    {c.name} {isThisAdmin && <span className="text-[7px] bg-amber-100 text-amber-700 px-1 py-0.5 rounded-sm uppercase tracking-widest">Admin</span>}
                                                </h4>
                                                <p className={`text-[9px] font-black mt-1 inline-block px-1.5 py-0.5 rounded uppercase tracking-wider ${isFar ? 'text-red-700 bg-red-200' : 'text-emerald-800 bg-emerald-200'}`}>
                                                   {t.doori}: {dist < 1 ? `${(dist*1000).toFixed(0)}m` : `${dist.toFixed(1)}km`} 
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-center gap-1 shrink-0">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm border-2 border-white ${isFar ? 'bg-red-500' : 'bg-slate-800'}`} style={{ transform: `rotate(${bearing}deg)` }}>
                                                <Navigation size={14} className="text-white fill-white" />
                                            </div>
                                        </div>
                                    </div>
                                    {groupMeta?.meetupPoint && (
                                        <div className="bg-white rounded-lg p-2 border border-slate-200 flex items-center justify-between text-[10px] font-black text-slate-500 shadow-sm">
                                            <span>🚩 ETA:</span><span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{etaString}</span>
                                        </div>
                                    )}
                                </div>
                              );
                            })
                          }
                      </div>
                   </div>
                </div>
              )}

              {/* CHAT TAB */}
              {activeTab === 'chat' && (
                <div className="flex flex-col h-[75vh] bg-[#efeae2] rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden relative">
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#475569 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                    <div className="bg-[#075e54] p-4 text-white font-black flex items-center justify-between shrink-0 relative z-10">
                        <div className="flex items-center gap-2"><MessageCircle size={18} /> {t.group} {t.chat}</div>
                    </div>
                    {!groupId ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-slate-500 p-6 text-center relative z-10 bg-white/80">
                            <MessageCircle size={40} className="mb-3 opacity-30"/>
                            <p className="font-bold text-xs">{t.offlineDesc}</p>
                        </div>
                    ) : (
                        <>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2 chat-scroll relative z-10 flex flex-col">
                                {messages.length === 0 ? (
                                    <div className="mx-auto bg-amber-100/80 text-amber-800 text-[10px] font-bold px-3 py-1.5 rounded-lg mt-4 shadow-sm">{t.noMessages}</div>
                                ) : (
                                    messages.map((msg, idx) => {
                                        const isMe = msg.senderId === user.uid;
                                        const msgTime = msg.timestamp && msg.timestamp.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                                        return (
                                            <div key={idx} className={`flex flex-col w-full ${isMe ? 'items-end' : 'items-start'} mb-1`}>
                                                <div className={`relative px-3 py-1.5 max-w-[85%] shadow-sm flex flex-col ${isMe ? 'msg-send' : 'msg-receive bg-white border border-slate-100 rounded-xl'}`} style={isMe ? { borderRadius: '12px' } : { borderRadius: '12px' }}>
                                                    {!isMe && <span className="text-[10px] font-black mb-0.5 leading-none" style={{color: msg.color || '#0ea5e9'}}>{msg.senderName}</span>}
                                                    <span className="text-[13px] text-slate-800 font-medium leading-snug whitespace-pre-wrap">{msg.text}</span>
                                                    <span className={`text-[8px] mt-0.5 font-bold flex gap-1 ${isMe ? 'justify-end text-green-800/60' : 'justify-start text-slate-400'}`}>{msgTime}</span>
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                                <div ref={chatEndRef} className="h-4 shrink-0" />
                            </div>
                            <form onSubmit={sendChatMessage} className="p-3 bg-transparent flex gap-2 shrink-0 relative z-10 pb-6">
                                <input value={newMessage} onChange={e => setNewMessage(e.target.value)} placeholder={t.typeMessage} className={`flex-1 bg-white rounded-full px-4 py-3 text-sm font-bold shadow-sm focus:outline-none focus:ring-2 focus:ring-[#128c7e] transition-all border border-slate-200 ${isUrdu ? 'pr-4' : 'pl-4'}`} />
                                <button type="submit" disabled={!newMessage.trim()} className="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 disabled:opacity-50 disabled:bg-slate-300 transition-all shrink-0">
                                    <Send size={18} className={isUrdu ? 'rotate-180' : '-ml-0.5 mt-0.5'} />
                                </button>
                            </form>
                        </>
                    )}
                </div>
              )}

              {/* SOS TAB */}
              {activeTab === 'sos' && (
                <div className="pt-8 flex flex-col items-center text-center space-y-6 animate-in zoom-in-95">
                    <div className="relative mt-2">
                        <div className="absolute inset-0 bg-red-500 rounded-full blur-[40px] opacity-20 animate-pulse"></div>
                        <div className="relative w-40 h-40 bg-white border-[8px] border-red-50 rounded-full flex items-center justify-center shadow-xl">
                            <ShieldAlert size={60} className="text-red-500" />
                        </div>
                    </div>
                    <div className="px-4">
                        <h2 className="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tight">{t.sosTitle}</h2>
                        <p className="text-slate-500 text-xs font-bold mb-6">{t.sosDesc}</p>
                        <div className="bg-white p-4 rounded-2xl border border-slate-100 inline-flex flex-col items-center shadow-sm w-full max-w-[260px]">
                           <span className="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">{t.adminNo}</span>
                           <span className="text-slate-800 font-mono font-black text-xl tracking-wide">{groupMeta?.emergencyPhone || "---"}</span>
                        </div>
                    </div>
                    <button onClick={() => setShowSOSModal(true)} disabled={!groupMeta?.emergencyPhone} className="w-full max-w-[280px] bg-red-600 text-white font-black text-2xl tracking-wide py-5 rounded-[2rem] shadow-[0_8px_0_rgb(153,27,27)] active:translate-y-2 active:shadow-none transition-all disabled:opacity-50 disabled:shadow-none">
                      {t.sosBtn}
                    </button>
                </div>
              )}
            </div>

            {/* Bottom Nav */}
            <div className="absolute bottom-0 left-0 right-0 z-40 glass-nav border-t border-slate-200">
               <div className="flex justify-around items-center p-2 max-w-md mx-auto relative">
                  {[ 
                      { id: 'group', icon: UsersRound, label: t.group }, 
                      { id: 'home', icon: MapPin, label: t.map }, 
                      { id: 'chat', icon: MessageCircle, label: t.chat },
                      { id: 'sos', icon: ShieldAlert, label: t.sos } 
                  ].map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-16 h-14 rounded-2xl transition-all relative ${activeTab === tab.id ? 'text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`}>
                          {activeTab === tab.id && <div className="absolute top-0 w-8 h-1 bg-emerald-500 rounded-b-full"></div>}
                          <tab.icon size={22} className={`mb-1 ${activeTab === tab.id ? 'stroke-[2.5px] scale-110' : ''} transition-transform`} />
                          <span className={`text-[9px] font-black uppercase tracking-wider ${activeTab === tab.id ? 'opacity-100' : 'opacity-0'}`}>{tab.label}</span>
                          {tab.id === 'chat' && unreadCount > 0 && (
                              <span className={`absolute top-1 ${isUrdu ? 'left-2' : 'right-2'} bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full min-w-[16px] shadow-sm border border-white`}>
                                  {unreadCount}
                              </span>
                          )}
                      </button>
                  ))}
               </div>
            </div>

            {/* --- MODALS & DRAWERS --- */}
            {showSOSModal && (
              <div className="absolute inset-0 z-50 flex items-end justify-center bg-slate-900/60 backdrop-blur-sm pb-4 px-4">
                 <div className="bg-white rounded-[2rem] p-6 w-full max-w-md text-center shadow-2xl animate-in slide-in-from-bottom-10">
                    <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
                    <h3 className="text-2xl font-black text-slate-800 mb-6">Action</h3>
                    <div className="space-y-3">
                        <button onClick={callAdminDirect} className="w-full bg-slate-900 text-white font-black text-base py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2"><PhoneCall size={20} /> Direct Call</button>
                        <button onClick={whatsappAdmin} className="w-full bg-[#25D366] text-white font-black text-base py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2"><MessageCircle size={20} /> WhatsApp</button>
                        <button onClick={() => setShowSOSModal(false)} className="w-full bg-slate-100 text-slate-500 font-black text-sm py-4 rounded-xl active:scale-95 uppercase tracking-widest mt-2">Cancel</button>
                    </div>
                 </div>
              </div>
            )}

            {showSupportModal && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/70 backdrop-blur-sm px-4">
                 <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                    <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-rose-100">
                        <Heart size={32} className="fill-rose-500 animate-pulse" />
                    </div>
                    <h3 className="text-2xl font-black text-slate-800 mb-2">{t.supportTitle}</h3>
                    <p className="text-slate-500 text-[11px] font-bold mb-6 leading-relaxed px-2">{t.supportDesc}</p>
                    <div className="bg-slate-50 p-4 rounded-3xl mb-6 border border-slate-100">
                        <img src={qrCodeApi} alt="UPI QR Code" className="mx-auto w-40 h-40 rounded-xl shadow-sm mb-4 bg-white p-2 border border-slate-200" />
                        <p className="font-mono font-black text-slate-800 text-xs bg-white py-2 px-4 rounded-xl border border-slate-200 shadow-inner">asaadilas905-1@okaxis</p>
                    </div>
                    <div className="flex gap-3">
                        <button onClick={copyUPI} className="flex-1 bg-rose-500 text-white font-black text-sm py-3.5 rounded-xl active:scale-95 transition-all shadow-md shadow-rose-200">{t.copyUpi}</button>
                        <button onClick={() => setShowSupportModal(false)} className="px-6 bg-slate-200 text-slate-600 font-black text-sm py-3.5 rounded-xl active:scale-95 transition-all uppercase tracking-widest">Close</button>
                    </div>
                 </div>
              </div>
            )}

            {isMenuOpen && (
              <div className="absolute inset-0 z-50 drawer-overlay flex animate-in fade-in duration-200">
                 <div className={`bg-white w-[80%] max-w-[300px] h-full shadow-2xl flex flex-col ${isUrdu ? 'ml-auto' : 'mr-auto'} animate-in ${isUrdu ? 'slide-in-from-right' : 'slide-in-from-left'}`}>
                    <div className="p-6 bg-emerald-600 text-white flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-black tracking-tight">{t.settings}</h2>
                            <p className="text-xs text-emerald-200 font-medium">Umrah Tracker v1.0</p>
                        </div>
                        <button onClick={() => setIsMenuOpen(false)} className="p-2 bg-white/20 rounded-full hover:bg-white/30 transition-colors"><XIcon size={20}/></button>
                    </div>
                    <div className="flex-1 overflow-y-auto py-4">
                        <button onClick={() => { setLegalContent('about'); setIsMenuOpen(false); }} className="w-full flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-slate-700">
                            <Info size={22} className="text-blue-500" /> <span className="font-bold">{t.aboutTitle}</span>
                        </button>
                        <button onClick={() => { setLegalContent('privacy'); setIsMenuOpen(false); }} className="w-full flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-slate-700">
                            <ShieldCheck size={22} className="text-emerald-500" /> <span className="font-bold">{t.privacyTitle}</span>
                        </button>
                        <button onClick={() => { setLegalContent('terms'); setIsMenuOpen(false); }} className="w-full flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-slate-700">
                            <FileText size={22} className="text-amber-500" /> <span className="font-bold">{t.termsTitle}</span>
                        </button>
                        <div className="mt-8 px-6">
                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Language (زبان)</p>
                            <div className="flex gap-2">
                                <button onClick={() => setLang('hi')} className={`flex-1 py-2 rounded-lg font-bold text-xs ${lang === 'hi' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-600'}`}>Hindi</button>
                                <button onClick={() => setLang('en')} className={`flex-1 py-2 rounded-lg font-bold text-xs ${lang === 'en' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-600'}`}>English</button>
                                <button onClick={() => setLang('ur')} className={`flex-1 py-2 rounded-lg font-bold text-xs ${lang === 'ur' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-600'}`}>Urdu</button>
                            </div>
                        </div>
                    </div>
                 </div>
                 <div className="flex-1" onClick={() => setIsMenuOpen(false)}></div>
              </div>
            )}

            {legalContent && (
              <div className="absolute inset-0 z-[60] bg-white flex flex-col animate-in slide-in-from-bottom-10 duration-300">
                 <div className="p-4 border-b border-slate-200 flex items-center gap-4 bg-slate-50">
                     <button onClick={() => setLegalContent(null)} className="p-2 bg-white rounded-full shadow-sm border border-slate-200 text-slate-600 active:scale-95"><XIcon size={20}/></button>
                     <h2 className="text-xl font-black text-slate-800">
                         {legalContent === 'about' ? t.aboutTitle : legalContent === 'privacy' ? t.privacyTitle : t.termsTitle}
                     </h2>
                 </div>
                 <div className="flex-1 overflow-y-auto p-6 bg-white">
                     <p className="text-slate-600 text-sm leading-loose font-medium whitespace-pre-line">
                         {legalContent === 'about' ? t.aboutDesc : legalContent === 'privacy' ? t.privacyDesc : t.termsDesc}
                     </p>
                     {legalContent === 'privacy' && (
                         <div className="mt-8 p-4 bg-blue-50 border border-blue-100 rounded-2xl">
                             <h4 className="font-black text-blue-900 mb-2">Data Collection & Deletion</h4>
                             <ul className={`list-disc ${isUrdu ? 'pr-5' : 'pl-5'} text-sm text-blue-800 space-y-2 font-medium`}>
                                 <li>We collect location data in real-time to show your position to your group.</li>
                                 <li>This data is encrypted using Firebase.</li>
                                 <li>Once you tap <b>"Leave Group"</b>, all your data (Name, Phone, Location, Chats) is instantly and permanently deleted.</li>
                             </ul>
                         </div>
                     )}
                 </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
