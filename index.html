    const firebaseConfig = {
      apiKey: "AIzaSyARE_XFQ3pJtAZe692cs8kUkyLEdFwIdnE",
      authDomain: "sathi-app-5734b.firebaseapp.com",
      projectId: "sathi-app-5734b",
      storageBucket: "sathi-app-5734b.firebasestorage.app",
      messagingSenderId: "115098030156",

    // --- Elegant SVG Icons ---
    const SvgIcon = ({ paths, size = 24, className = "", onClick }) => (
      <svg onClick={onClick} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: paths}} />

    const Navigation = (p) => <SvgIcon paths='<polygon points="3 11 22 2 13 21 11 13 3 11"/>' {...p}/>;
    const UserIcon = (p) => <SvgIcon paths='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' {...p}/>;
    const UsersRound = (p) => <SvgIcon paths='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' {...p}/>;

    const MapPin = (p) => <SvgIcon paths='<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z"/><circle cx="12" cy="10" r="3"/>' {...p}/>;
    const ShieldAlert = (p) => <SvgIcon paths='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/>' {...p}/>;
    const Crosshair = (p) => <SvgIcon paths='<circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/>' {...p}/>;
    const CheckCircle2 = (p) => <SvgIcon paths='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' {...p}/>;
    const Crown = (p) => <SvgIcon paths='<path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>' {...p}/>;
    const UserMinus = (p) => <SvgIcon paths='<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="23" x2="17" y1="11" y2="11"/>' {...p}/>;
    const PhoneCall = (p) => <SvgIcon paths='<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/><path d="M14.05 2a9 9 0 0 1 8 7.94"/><path d="M14.05 6A5 5 0 0 1 18 10"/>' {...p}/>;
    const MessageCircle = (p) => <SvgIcon paths='<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>' {...p}/>;
    const FlagOff = (p) => <SvgIcon paths='<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/>' {...p}/>;
    const Flag = (p) => <SvgIcon paths='<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/>' {...p}/>;
    const Route = (p) => <SvgIcon paths='<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>' {...p}/>;
    const Layers = (p) => <SvgIcon paths='<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>' {...p}/>;

    // --- Math Utils ---
    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
      const R = 6371; const dLat = (lat2 - lat1) * (Math.PI / 180); const dLon = (lon2 - lon1) * (Math.PI / 180);
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }
    function getBearing(lat1, lon1, lat2, lon2) {
      const y = Math.sin((lon2 - lon1) * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180));
      const x = Math.cos(lat1 * (Math.PI / 180)) * Math.sin(lat2 * (Math.PI / 180)) - Math.sin(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.cos((lon2 - lon1) * (Math.PI / 180));
      return (Math.atan2(y, x) * (180 / Math.PI) + 360) % 360;
    }

    const useGoogleMaps = (apiKey) => {
      const [isLoaded, setIsLoaded] = useState(false);
      useEffect(() => {
        if (window.google) { setIsLoaded(true); return; }
        if (!apiKey) return;
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=geometry`;
        script.async = true; script.defer = true;
        script.onload = () => setIsLoaded(true);
        document.head.appendChild(script);
      }, [apiKey]);
      return isLoaded;
    };

    // =========================================================
    // MAP COMPONENT
    // =========================================================
    const GoogleMapView = ({ myLocation, companions, isLoaded, meetupPoint, meetupLabel, onMapClick, mapType, focusCoords }) => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef({});
      const myMarkerRef = useRef(null);
      const myInfoRef = useRef(null);
      const meetupMarkerRef = useRef(null);
      const meetupInfoRef = useRef(null);
      const circleRef = useRef(null);
      const defaultLoc = { lat: 21.4225, lng: 39.8262 };

      useEffect(() => {
        if (isLoaded && mapRef.current && !mapInstanceRef.current && window.google) {
          mapInstanceRef.current = new window.google.maps.Map(mapRef.current, {
            center: myLocation || defaultLoc, zoom: 17, disableDefaultUI: true, zoomControl: false, mapTypeId: mapType || 'roadmap'
          });
          mapInstanceRef.current.addListener('click', (e) => { 
              if(onMapClick) onMapClick({ lat: e.latLng.lat(), lng: e.latLng.lng() }); 
          });
        }
      }, [isLoaded]);

      useEffect(() => {
          if(mapInstanceRef.current && isLoaded) mapInstanceRef.current.setMapTypeId(mapType);
      }, [mapType, isLoaded]);

      useEffect(() => {
          if(mapInstanceRef.current && isLoaded && focusCoords) {
              mapInstanceRef.current.panTo({ lat: focusCoords.lat, lng: focusCoords.lng });
              mapInstanceRef.current.setZoom(19);
          }
      }, [focusCoords, isLoaded]);

      useEffect(() => {
        if (mapInstanceRef.current && window.google) {
          const loc = myLocation || defaultLoc;
          if (!myMarkerRef.current) {
            myMarkerRef.current = new window.google.maps.Marker({
              position: loc, map: mapInstanceRef.current,
              icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#3b82f6', fillOpacity: 1, strokeColor: '#ffffff', strokeWeight: 3 }, zIndex: 1000
            });
            myInfoRef.current = new window.google.maps.InfoWindow({
                content: `<div style="font-weight:800;color:#2563eb;padding:3px;font-size:13px;font-family:sans-serif;">Aap Yahan Hain (Me)</div>`, disableAutoPan: true
            });
            myInfoRef.current.open(mapInstanceRef.current, myMarkerRef.current);
            mapInstanceRef.current.panTo(loc);
          } else { 
              myMarkerRef.current.setPosition(loc); 
          }
          if (circleRef.current) circleRef.current.setMap(null);
          if (myLocation) {
              circleRef.current = new window.google.maps.Circle({ strokeColor: "#10b981", strokeOpacity: 0.4, strokeWeight: 2, fillColor: "#10b981", fillOpacity: 0.1, map: mapInstanceRef.current, center: myLocation, radius: 300 });
          }
        }
      }, [myLocation, isLoaded]);

      useEffect(() => {
          if (mapInstanceRef.current && window.google) {
              if (meetupMarkerRef.current) meetupMarkerRef.current.setMap(null);
              if (meetupInfoRef.current) meetupInfoRef.current.close();
              if (meetupPoint) {
                  meetupMarkerRef.current = new window.google.maps.Marker({
                      position: meetupPoint, map: mapInstanceRef.current,
                      icon: { path: 'M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z', fillColor: '#ef4444', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 1.6 }, zIndex: 950
                  });
                  if(meetupLabel){
                      meetupInfoRef.current = new window.google.maps.InfoWindow({
                          content: `<div style="font-weight:900;color:#b91c1c;padding:3px 6px;font-size:15px;font-family:sans-serif;">🚩 ${meetupLabel}</div>`, disableAutoPan: true
                      });
                      meetupInfoRef.current.open(mapInstanceRef.current, meetupMarkerRef.current);
                  }
              }
          }
      }, [meetupPoint, meetupLabel, isLoaded]);

      useEffect(() => {
        if (mapInstanceRef.current && window.google) {
          companions.forEach(comp => {
            if (!markersRef.current[comp.id]) {
              const info = new window.google.maps.InfoWindow({ content: `<div style="color:#000;font-weight:bold;padding:4px;font-size:13px;font-family:sans-serif;">${comp.name}</div>`, disableAutoPan:true });
              const marker = new window.google.maps.Marker({
                position: { lat: comp.lat, lng: comp.lng }, map: mapInstanceRef.current,
                icon: { path: window.google.maps.SymbolPath.BACKWARD_CLOSED_ARROW, scale: 7, fillColor: comp.color || '#f59e0b', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }, zIndex: 900
              });
              info.open(mapInstanceRef.current, marker);
              markersRef.current[comp.id] = { marker, info };
            } else { markersRef.current[comp.id].marker.setPosition({ lat: comp.lat, lng: comp.lng }); }
          });
          const ids = companions.map(c => c.id);
          Object.keys(markersRef.current).forEach(id => {
            if (!ids.includes(id)) { markersRef.current[id].marker.setMap(null); markersRef.current[id].info.close(); delete markersRef.current[id]; }
          });
        }
      }, [companions, isLoaded]);

      return (
        <div ref={mapRef} className="w-full h-full bg-slate-100 flex items-center justify-center">
             {!isLoaded && <div className="animate-spin rounded-full h-10 w-10 border-b-4 border-emerald-500"></div>}
        </div>
      );
    };

    // =========================================================
    // MAIN APP COMPONENT
    // =========================================================
    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('group');
      const [myLocation, setMyLocation] = useState(null);
      
      const [companions, setCompanions] = useState([]);
      const [groupId, setGroupId] = useState('');
      const [groupMeta, setGroupMeta] = useState(null);
      
      const [myName, setMyName] = useState('');
      const [myPhone, setMyPhone] = useState('');
      const [createEmergencyPhone, setCreateEmergencyPhone] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [myColor, setMyColor] = useState('#3b82f6');
      
      const [mapType, setMapType] = useState('roadmap');
      const [focusCoords, setFocusCoords] = useState(null);
      
      const [showModal, setShowModal] = useState(false);
      const [copied, setCopied] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      
      const isMapLoaded = useGoogleMaps(GOOGLE_MAPS_API_KEY);
      const prevCompanionsRef = useRef([]);

      const isAdmin = user && groupMeta && user.uid === groupMeta.creatorId;

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (e) { console.error("Auth err", e); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, (u) => {
            setUser(u);
            const colors = ['#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
            setMyColor(colors[Math.floor(Math.random() * colors.length)]);
        });
        return () => unsub();
      }, []);

      // Proper GPS Fetching Logic
      useEffect(() => {
        if (!navigator.geolocation) {
            showToast("Aapke browser me GPS support nahi karta.");
            return;
        }
        
        const watchId = navigator.geolocation.watchPosition(
          (p) => setMyLocation({ lat: p.coords.latitude, lng: p.coords.longitude }),
          (err) => { 
              console.warn(err);
              if (err.code === 1) showToast("Bhai, Location Permission ON karo tabhi Map chalega!");
              else showToast("GPS signal nahi mil raha. Khuli jagah me aao.");
              setMyLocation({ lat: 21.4225, lng: 39.8262 }); // Keep fallback so map renders, but warn user.
          }, 
          { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
        );
        return () => navigator.geolocation.clearWatch(watchId);
      }, []);

      useEffect(() => {
          if(!user || !groupId || !groupMeta) return;
          if(groupMeta.banned && groupMeta.banned.includes(user.uid)) {
              showToast("Admin ne aapko group se nikal diya hai.");
              setGroupId(''); setGroupMeta(null); setCompanions([]); setActiveTab('group');
          }
      }, [groupMeta, user, groupId]);

      useEffect(() => {
        if (!user || !groupId || !myLocation || !myName.trim()) return;
        if(groupMeta && groupMeta.banned && groupMeta.banned.includes(user.uid)) return;

        const sync = async () => {
          try {
            await setDoc(doc(db, 'hajj_groups', groupId, 'members', user.uid), {
                id: user.uid, name: myName.trim(), phone: myPhone.trim(), lat: myLocation.lat, lng: myLocation.lng, color: myColor, lastUpdated: serverTimestamp()
            }, { merge: true });
          } catch(e) {}
        }
        sync();
        const interval = setInterval(sync, 4000);
        return () => clearInterval(interval);
      }, [user, groupId, myLocation, myName, myPhone, myColor, groupMeta]);

      useEffect(() => {
        if (!user || !groupId) return;
        const unsubMeta = onSnapshot(doc(db, 'hajj_groups', groupId), (d) => {
            if(d.exists()) setGroupMeta(d.data());
        });
        const unsubMembers = onSnapshot(collection(db, 'hajj_groups', groupId, 'members'), (snap) => {
          const list = []; 
          snap.forEach(d => { if (d.id !== user.uid) list.push(d.data()); }); 
          
          if(isAdmin && list.length > prevCompanionsRef.current.length && prevCompanionsRef.current.length > 0) {
              const newMembers = list.filter(m => !prevCompanionsRef.current.find(p => p.id === m.id));
              if(newMembers.length > 0) showToast(`🎉 ${newMembers[0].name} ne group Join kiya!`);
          }
          prevCompanionsRef.current = list;
          setCompanions(list);
        });
        return () => { unsubMeta(); unsubMembers(); };
      }, [user, groupId, isAdmin]);

      const handleCreate = async () => {
        if (!myName.trim() || !createEmergencyPhone.trim()) { showToast("Name & Emergency Number zaroori hai"); return; }
        if (!user) { showToast("Connecting... Wait"); return; }
        const code = Math.floor(10000 + Math.random() * 90000).toString();
        try {
            await setDoc(doc(db, 'hajj_groups', code), { 
                emergencyPhone: createEmergencyPhone.trim(), creatorId: user.uid, creatorName: myName.trim(), banned: []
            });
            setGroupId(code); setActiveTab('home');
        } catch(e) { showToast("Database Rules lock hain!"); }
      };

      const handleRemoveUser = async (uid, name) => {
          if(!isAdmin) return;
          if(window.confirm(`Kya aap sach me ${name} ko group se nikalna chahte hain?`)) {
              try {
                  await deleteDoc(doc(db, 'hajj_groups', groupId, 'members', uid));
                  const currentBanned = groupMeta.banned || [];
                  await setDoc(doc(db, 'hajj_groups', groupId), { banned: [...currentBanned, uid] }, {merge: true});
                  showToast(`${name} ko Remove kar diya gaya.`);
              } catch(e) { showToast("Remove karne me error aaya."); }
          }
      };

      const handleMapClickForMeetup = async (point) => {
          if (!isAdmin || !groupId) return;
          const label = window.prompt("Map Jhande (Flag) par kya likhna hai? (Jaise: Hotel, Gate No 2)", "Milne ki Jagah");
          if (label !== null && label.trim() !== "") {
              try { await setDoc(doc(db, 'hajj_groups', groupId), { meetupPoint: point, meetupLabel: label }, { merge: true }); showToast("Flag lag gaya!"); } 
              catch(e) {}
          }
      };

      const removeMeetupFlag = async (e) => {
          e.stopPropagation();
          if (!isAdmin || !groupId) return;
          if(window.confirm("Kya aap Map Flag ko hatana chahte hain?")) {
              await setDoc(doc(db, 'hajj_groups', groupId), { meetupPoint: null, meetupLabel: "" }, { merge: true });
          }
      };

      const handleJoin = async () => {
        if (!myName.trim() || !joinCode.trim()) { showToast("Name & Code zaroori hai"); return; }
        if (!user) { showToast("Connecting... Wait"); return; }
        try {
            const snap = await getDoc(doc(db, 'hajj_groups', joinCode.trim()));
            if (snap.exists()) { 
                const data = snap.data();
                if(data.banned && data.banned.includes(user.uid)){ showToast("Admin ne aapko is group se ban kiya hua hai."); return; }
                setGroupId(joinCode.trim()); setActiveTab('home'); 
            } else showToast("Galat Group Code");
        } catch(e) { showToast("Database Rules lock hain!"); }
      };

      const leaveGroup = async () => {
          if(window.confirm("Kya aap group chhodna chahte hain?")){
              if(user && groupId) { try { await deleteDoc(doc(db, 'hajj_groups', groupId, 'members', user.uid)); } catch(e) {} }
              setGroupId(''); setCompanions([]); setGroupMeta(null); setActiveTab('group');
          }
      };

      const callAdminDirect = () => {
          const p = groupMeta?.emergencyPhone.replace(/\D/g, ''); window.location.href = `tel:+${p}`; setShowModal(false);
      };

      const whatsappAdmin = () => {
          const p = groupMeta?.emergencyPhone.replace(/\D/g, ''); 
          const link = myLocation ? `https://www.google.com/maps/search/?api=1&query=${myLocation.lat},${myLocation.lng}` : '';
          window.open(`https://wa.me/${p}?text=🚨 EMERGENCY ALERT 🚨%0A%0AName: ${myName}%0APhone: ${myPhone}%0ALocation: ${link}`, '_blank');
          setShowModal(false);
      };

      // --- New Direction Logic ---
      const getDirectionsToFlag = (e) => {
          e.stopPropagation();
          if(!myLocation || !groupMeta?.meetupPoint) {
              showToast("Aapki ya Flag ki location nahi mil rahi."); return;
          }
          // Open Native Google Maps for Walking Directions
          const url = `https://www.google.com/maps/dir/?api=1&origin=${myLocation.lat},${myLocation.lng}&destination=${groupMeta.meetupPoint.lat},${groupMeta.meetupPoint.lng}&travelmode=walking`;
          window.open(url, '_blank');
      };

      const focusOnMeetup = () => {
          if(groupMeta?.meetupPoint) setFocusCoords({ ...groupMeta.meetupPoint, t: Date.now() });
      };

      const recenterMapToMe = () => {
          if(myLocation) setFocusCoords({ ...myLocation, t: Date.now() });
      };

      const toggleMapType = () => setMapType(t => t === 'roadmap' ? 'hybrid' : 'roadmap');

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 4000); }
      const copyCode = () => { navigator.clipboard.writeText(groupId); setCopied(true); setTimeout(() => setCopied(false), 2000); }

      return (
        <div className="h-[100dvh] w-full flex justify-center font-sans text-slate-800 bg-slate-900 sm:p-4">
          <div className="w-full max-w-md flex flex-col h-full bg-slate-50 sm:rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            
            <div className="p-5 bg-white border-b border-slate-100 flex items-center justify-between z-10 shrink-0">
              <div className="flex items-center gap-3">
                <div className="bg-emerald-500 p-2.5 rounded-2xl text-white shadow-lg shadow-emerald-200"><Navigation size={22} /></div>
                <div>
                   <h1 className="text-xl font-black text-slate-800 uppercase tracking-tight leading-none">Saathi <span className="text-emerald-500">VIP</span></h1>
                   <p className="text-[10px] text-slate-400 font-bold tracking-widest mt-1">Live Hajj Tracker</p>
                </div>
              </div>
              {isAdmin && <div className="bg-amber-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-amber-200 shadow-sm">
                  <Crown size={14} className="text-amber-500" /><span className="text-[10px] font-bold text-amber-700 uppercase tracking-widest">Admin</span>
              </div>}
            </div>

            {toastMsg && (
                <div className="absolute top-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-2xl text-sm font-bold shadow-[0_10px_40px_rgba(0,0,0,0.3)] z-50 flex items-center gap-3 transition-all text-center w-max max-w-[90%] animate-in fade-in slide-in-from-top-4 border border-slate-700">
                    <CheckCircle2 size={18} className="text-emerald-400 shrink-0" /> <span className="truncate">{toastMsg}</span>
                </div>
            )}

            <div className="flex-1 overflow-y-auto p-4 pb-36 space-y-6">
              
              {activeTab === 'group' && (
                <div className="space-y-6 animate-in fade-in duration-300">
                   <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                      <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><UserIcon size={14} className="text-emerald-500"/> Aapki Details</h3>
                      <input value={myName} onChange={e => setMyName(e.target.value)} placeholder="Aapka Pura Naam" className="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-50 font-bold mb-3 transition-all" />
                      <input value={myPhone} onChange={e => setMyPhone(e.target.value)} placeholder="Aapka Mobile No." type="tel" className="w-full p-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-50 font-bold transition-all" />
                   </div>

                   {!groupId ? (
                     <div className="space-y-5">
                        <div className="bg-gradient-to-br from-emerald-50 to-emerald-100 p-6 rounded-3xl border border-emerald-200 relative overflow-hidden shadow-sm">
                            <Crown size={100} className="absolute -right-6 -bottom-6 text-emerald-500 opacity-5" />
                            <h3 className="font-black text-emerald-900 text-lg mb-1 relative z-10 tracking-tight">Admin Ban Kar Group Banayein</h3>
                            <p className="text-[11px] text-emerald-700/80 mb-5 relative z-10 font-medium">Emergency ke liye ek pakka WhatsApp number set karein.</p>
                            <input value={createEmergencyPhone} onChange={e => setCreateEmergencyPhone(e.target.value)} placeholder="Emergency WhatsApp No." type="tel" className="w-full p-4 rounded-xl mb-4 outline-none border border-white focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100 font-bold bg-white shadow-sm relative z-10 transition-all" />
                            <button onClick={handleCreate} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black text-sm uppercase tracking-wider py-4 rounded-xl shadow-[0_8px_20px_rgba(5,150,105,0.2)] transition-all active:scale-95 active:shadow-none relative z-10">Group Create Karein</button>
                        </div>
                        
                        <div className="flex items-center gap-3 px-4">
                            <div className="h-px bg-slate-200 flex-1"></div>
                            <span className="text-slate-400 font-bold text-[10px] tracking-widest uppercase">Ya Phir</span>
                            <div className="h-px bg-slate-200 flex-1"></div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <h3 className="font-black text-slate-800 text-lg mb-1 tracking-tight">Group Join Karein</h3>
                            <p className="text-[11px] text-slate-500 mb-5 font-medium">Apne Admin ka diya gaya 5-digit code dalein.</p>
                            <div className="flex gap-2">
                                <input value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="CODE" type="number" className="flex-1 p-4 rounded-xl outline-none border border-slate-100 bg-slate-50 font-mono font-black text-center text-xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all" />
                                <button onClick={handleJoin} className="bg-blue-600 hover:bg-blue-700 text-white px-6 font-black text-sm uppercase tracking-wider rounded-xl shadow-[0_8px_20px_rgba(37,99,235,0.2)] transition-all active:scale-95 active:shadow-none">Join</button>
                            </div>
                        </div>
                     </div>
                   ) : (
                     <div className="bg-slate-900 p-8 rounded-[2.5rem] text-center text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-40 h-40 bg-emerald-500 rounded-full blur-[60px] opacity-30"></div>
                        <div className="absolute bottom-0 left-0 w-40 h-40 bg-blue-500 rounded-full blur-[60px] opacity-20"></div>
                        
                        <UsersRound size={56} className="mx-auto mb-5 text-emerald-400 relative z-10" />
                        <h2 className="text-3xl font-black mb-2 relative z-10 tracking-tight">Group Active</h2>
                        <p className="text-xs text-slate-400 mb-8 relative z-10 font-medium">Naye saathiyon ko join karwane ke liye yeh Code bhejein.</p>
                        
                        <div className="bg-white/10 backdrop-blur-md border border-white/10 p-6 rounded-3xl mb-8 flex flex-col items-center relative z-10">
                            <p className="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-2">Aapka Group Code</p>
                            <div className="flex items-center gap-4">
                               <span className="text-5xl font-mono font-black text-white tracking-widest">{groupId}</span>
                               <button onClick={copyCode} className={`p-3 rounded-xl transition-all ${copied ? 'bg-emerald-500 text-white shadow-lg' : 'bg-white/20 text-white hover:bg-white/30'}`}><Copy size={22}/></button>
                            </div>
                        </div>
                        <button onClick={leaveGroup} className="w-full bg-white/5 text-slate-300 font-bold text-sm uppercase tracking-widest py-4 rounded-xl hover:bg-red-500 hover:text-white transition-all border border-white/10 hover:border-red-500 relative z-10">Group Chhodein</button>
                     </div>
                   )}
                </div>
              )}

              {activeTab === 'home' && (
                <div className="space-y-4 animate-in fade-in duration-300">
                   
                   {!groupId && (
                      <div className="bg-amber-50 border border-amber-200 p-5 rounded-2xl flex items-start gap-4 shadow-sm">
                         <AlertTriangle size={24} className="shrink-0 text-amber-500 mt-1" />
                         <div>
                            <p className="font-black text-amber-900 mb-1">Aap Offline Hain</p>
                            <p className="text-amber-700/80 text-[11px] mb-3 leading-relaxed font-medium">Map par apne saathiyon ko dekhne ke liye pehle ek Group banayein ya Join karein.</p>
                            <button onClick={() => setActiveTab('group')} className="bg-amber-200 hover:bg-amber-300 px-4 py-2 rounded-xl text-amber-900 font-bold text-[10px] uppercase tracking-widest transition-colors">Group Page Par Jayein</button>
                         </div>
                      </div>
                   )}

                   {/* --- NEW: Advanced Meetup Banner with Directions Button --- */}
                   {groupId && groupMeta?.meetupPoint && (
                      <div onClick={focusOnMeetup} className="bg-red-50 border-2 border-red-200 p-3.5 pl-4 rounded-[1.5rem] flex items-center justify-between cursor-pointer active:scale-95 transition-all shadow-[0_4px_15px_rgba(239,68,68,0.1)] hover:shadow-[0_4px_20px_rgba(239,68,68,0.2)] group relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-16 h-16 bg-red-500 rounded-full blur-2xl opacity-10 group-hover:opacity-20 transition-opacity"></div>
                        
                        <div className="flex flex-col relative z-10">
                            <p className="text-[9px] text-red-500 font-black uppercase tracking-widest flex items-center gap-1.5 mb-0.5">
                                <Flag size={10} className="fill-red-500"/> Milne ki Jagah <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                            </p>
                            <p className="text-base font-black text-red-800 leading-tight">{groupMeta.meetupLabel}</p>
                        </div>

                        <div className="flex items-center gap-2 relative z-10">
                           {/* Directions Button for Users */}
                           <button onClick={getDirectionsToFlag} className="bg-blue-600 text-white px-3 py-2 rounded-xl shadow-md shadow-blue-500/30 hover:bg-blue-700 active:scale-90 transition-all flex items-center gap-1.5 text-xs font-bold">
                               <Route size={16} /> Raasta 
                           </button>

                           {/* Remove Button for Admin */}
                           {isAdmin && (
                              <button onClick={removeMeetupFlag} className="p-2 bg-white rounded-xl text-red-400 hover:text-red-600 hover:bg-red-100 transition-colors shadow-sm border border-red-100" title="Remove Flag">
                                  <FlagOff size={18}/>
                              </button>
                           )}
                        </div>
                      </div>
                   )}

                   <div className="relative w-full h-[45vh] min-h-[350px] rounded-[2rem] shadow-md border-4 border-white overflow-hidden bg-slate-200">
                      <GoogleMapView myLocation={myLocation} companions={companions} isLoaded={isMapLoaded} meetupPoint={groupMeta?.meetupPoint} meetupLabel={groupMeta?.meetupLabel} onMapClick={handleMapClickForMeetup} mapType={mapType} focusCoords={focusCoords} />
                      
                      <div className="absolute top-4 left-4 flex flex-col gap-2">
                          <div className="bg-white/90 backdrop-blur-md px-3 py-2 rounded-xl text-[10px] font-black tracking-widest uppercase shadow-lg text-slate-700 border border-slate-200/50">
                             Group <span className="text-emerald-600 ml-1">{groupId || '---'}</span>
                          </div>
                      </div>

                      <button onClick={toggleMapType} className="absolute top-4 right-4 bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-lg border border-slate-200/50 text-slate-700 hover:bg-slate-50 transition-all active:scale-90" title="Change Map Mode">
                          <Layers size={22} className={mapType === 'hybrid' ? 'text-emerald-600' : ''} />
                      </button>

                      <button onClick={recenterMapToMe} className="absolute bottom-6 right-4 z-20 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-[0_8px_20px_rgba(37,99,235,0.4)] border-2 border-white hover:bg-blue-700 transition-all active:scale-90">
                        <Crosshair size={26} />
                      </button>

                      {groupId && isAdmin && !groupMeta?.meetupPoint && (
                         <div className="absolute bottom-6 left-4 right-20 bg-slate-900/80 backdrop-blur-md text-white text-[10px] p-3 rounded-2xl shadow-xl border border-slate-700 font-medium leading-relaxed pointer-events-none">
                            👑 <strong className="text-amber-400">Admin Tip:</strong> Map par kisi bhi jagah click karke ek <b>Custom Flag</b> lagayein taaki sab wahan aakar mil sakein.
                         </div>
                      )}
                   </div>

                   <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                      <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-between mb-4">
                          <span className="flex items-center gap-2"><Compass size={14} className="text-blue-500"/> Disha aur Suraksha</span>
                          {companions.length > 0 && <span className="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full">{companions.length} Member</span>}
                      </h3>
                      
                      <div className="space-y-3">
                          {companions.length === 0 ? (
                              <div className="text-center py-8 bg-slate-50 rounded-2xl border border-slate-100 border-dashed">
                                  <UsersRound size={32} className="mx-auto text-slate-300 mb-2"/>
                                  <p className="text-xs text-slate-400 font-bold">Abhi group me sirf aap hain.</p>
                              </div>
                          ) : 
                            companions.map(c => {
                              const dist = myLocation ? getDistanceFromLatLonInKm(myLocation.lat, myLocation.lng, c.lat, c.lng) : 0;
                              const bearing = myLocation ? getBearing(myLocation.lat, myLocation.lng, c.lat, c.lng) : 0;
                              const isFar = (dist * 1000) > 300; 
                              const isThisAdmin = groupMeta?.creatorId === c.id;

                              return (
                                <div key={c.id} className={`p-4 rounded-2xl border flex items-center justify-between transition-all relative overflow-hidden ${isFar ? 'bg-red-50 border-red-200 shadow-[0_4px_15px_rgba(239,68,68,0.1)]' : 'bg-slate-50 border-slate-100 hover:bg-slate-100'}`}>
                                    
                                    {isAdmin && (
                                        <button onClick={() => handleRemoveUser(c.id, c.name)} className="absolute top-2 right-2 p-1.5 bg-red-100 text-red-600 rounded-full hover:bg-red-500 hover:text-white transition-colors" title="Member ko nikalein">
                                            <UserMinus size={14} />
                                        </button>
                                    )}

                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-black text-xl shadow-inner border-2 border-white shrink-0 relative" style={{ backgroundColor: c.color || '#3b82f6' }}>
                                            {c.name.charAt(0)}
                                            {isThisAdmin && <div className="absolute -top-1 -right-1 bg-amber-400 p-1 rounded-full border-2 border-white shadow-sm"><Crown size={10} className="text-white"/></div>}
                                        </div>
                                        <div>
                                            <h4 className="font-black text-slate-800 line-clamp-1 pr-6 flex items-center gap-1.5 text-sm">
                                                {c.name} 
                                                {isThisAdmin && <span className="text-[8px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-sm uppercase tracking-widest border border-amber-200">Admin</span>}
                                            </h4>
                                            <p className={`text-[10px] font-black mt-1.5 inline-block px-2 py-1 rounded-lg uppercase tracking-wider ${isFar ? 'text-red-700 bg-red-200' : 'text-emerald-800 bg-emerald-200'}`}>
                                               Doori: {dist < 1 ? `${(dist*1000).toFixed(0)}m` : `${dist.toFixed(1)}km`} 
                                               {isFar && <span className="ml-1 animate-pulse">— Door Hai!</span>}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center gap-1.5 min-w-[40px] mt-2">
                                        <div className={`w-11 h-11 rounded-full flex items-center justify-center shadow-md transition-transform duration-500 shrink-0 border-2 border-white ${isFar ? 'bg-red-500' : 'bg-slate-800'}`} style={{ transform: `rotate(${bearing}deg)` }}>
                                            <Navigation size={20} className="text-white fill-white" />
                                        </div>
                                        <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest">N ↑</span>
                                    </div>
                                </div>
                              );
                            })
                          }
                      </div>
                   </div>
                </div>
              )}

              {activeTab === 'sos' && (
                <div className="pt-8 flex flex-col items-center text-center space-y-8 animate-in zoom-in-95">
                    <div className="relative mt-4">
                        <div className="absolute inset-0 bg-red-500 rounded-full blur-[50px] opacity-30 animate-pulse"></div>
                        <div className="relative w-44 h-44 bg-white border-[10px] border-red-50 rounded-full flex items-center justify-center shadow-2xl shadow-red-500/20">
                            <ShieldAlert size={72} className="text-red-500" />
                        </div>
                    </div>
                    <div className="px-6">
                        <h2 className="text-4xl font-black text-slate-800 mb-3 uppercase tracking-tight">Emergency SOS</h2>
                        <p className="text-slate-500 text-sm leading-relaxed mb-8 font-medium">Bheed me kho jane par dabayein. Admin ko turant Call ya WhatsApp location chali jayegi.</p>
                        
                        <div className="bg-white p-5 rounded-3xl border border-slate-100 inline-flex flex-col items-center shadow-sm w-full max-w-[280px]">
                           <span className="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1.5 flex items-center gap-1.5"><Crown size={12} className="text-amber-500"/> Admin WhatsApp No.</span>
                           <span className="text-slate-800 font-mono font-black text-2xl tracking-wide">{groupMeta?.emergencyPhone || "---"}</span>
                        </div>
                    </div>
                    <button 
                       onClick={() => setShowModal(true)} disabled={!groupMeta?.emergencyPhone} 
                       className="w-full max-w-[300px] bg-red-600 text-white font-black text-3xl tracking-wide py-6 rounded-[2rem] shadow-[0_10px_0_rgb(153,27,27)] active:translate-y-2 active:shadow-none transition-all disabled:opacity-50 disabled:shadow-none"
                    >
                      HELP ME!
                    </button>
                </div>
              )}
            </div>

            <div className="absolute bottom-6 left-6 right-6 z-40">
               <div className="glass-nav border border-white/40 p-2.5 rounded-[2rem] flex justify-around shadow-[0_20px_50px_rgba(0,0,0,0.1)]">
                  {[ { id: 'group', icon: UsersRound, label: "Group" }, { id: 'home', icon: MapPin, label: "Map" }, { id: 'sos', icon: ShieldAlert, label: "SOS" } ].map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center p-3.5 px-6 rounded-[1.5rem] transition-all duration-300 ${activeTab === tab.id ? 'bg-emerald-500 text-white shadow-[0_8px_20px_rgba(16,185,129,0.3)] scale-105' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}`}>
                          <tab.icon size={24} className={activeTab === tab.id ? 'stroke-[2.5px]' : ''} />
                          <span className="text-[10px] font-black mt-1.5 uppercase tracking-widest">{tab.label}</span>
                      </button>
                  ))}
               </div>
            </div>

            {showModal && (
              <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300 pb-0 sm:p-6">
                 <div className="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 w-full max-w-md text-center shadow-2xl animate-in slide-in-from-bottom-10 sm:slide-in-from-bottom-0 sm:zoom-in-95">
                    <div className="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-8 sm:hidden"></div>
                    
                    <h3 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Admin Ko Bulaayein</h3>
                    <p className="text-slate-500 text-sm mb-8 font-medium">Aap emergency me kya karna chahte hain?</p>
                    
                    <div className="space-y-4">
                        <button onClick={callAdminDirect} className="w-full bg-slate-900 text-white font-black tracking-wide text-lg py-5 rounded-2xl shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center justify-center gap-3">
                            <PhoneCall size={22} /> Direct Call Karein
                        </button>
                        <button onClick={whatsappAdmin} className="w-full bg-[#25D366] text-white font-black tracking-wide text-lg py-5 rounded-2xl shadow-xl shadow-green-500/20 hover:bg-[#1ebe57] active:scale-95 transition-all flex items-center justify-center gap-3">
                            <MessageCircle size={22} /> WhatsApp Location
                        </button>
                        <div className="pt-4 pb-2">
                           <button onClick={() => setShowModal(false)} className="w-full bg-slate-100 text-slate-500 font-black text-sm py-4 rounded-xl active:scale-95 transition-transform uppercase tracking-widest">Cancel</button>
                        </div>
                    </div>
                 </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
